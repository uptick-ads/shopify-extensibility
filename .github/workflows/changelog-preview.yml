name: "Changelog Preview"

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  Preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate CHANGES.md with git-cliff
        uses: orhun/git-cliff-action@v4.6.0
        with:
          config: cliff.toml
          args: --unreleased
        env:
          OUTPUT: CHANGES.md

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet CHANGES.md 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit CHANGES.md
        if: steps.diff.outputs.changed == 'true'
        uses: EndBug/add-and-commit@v9
        with:
          add: 'CHANGES.md'
          message: 'chore(changelog): generate preview'
          push: true
