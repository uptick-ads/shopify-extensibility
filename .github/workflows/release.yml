name: "Release"

on:
  workflow_run:
    workflows: [Test]
    branches: [main]
    types:
      - completed

permissions:
  contents: write

jobs:
  Release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          SLACK_BOT_TOKEN: op://uptick-production/github-actions/slack-bot-token

      - name: Check for manual CHANGES.md
        id: check_changes
        run: |
          if [ -f CHANGES.md ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog with git-cliff
        if: steps.check_changes.outputs.exists == 'false'
        uses: orhun/git-cliff-action@v4.6.0
        with:
          config: cliff.toml
          args: --unreleased
        env:
          OUTPUT: CHANGES.md

      - name: Read changelog
        id: read_changes
        uses: mindsers/changelog-reader-action@v2
        with:
          path: CHANGES.md
          validation_level: none

      - name: Calculate next version
        id: version
        run: |
          next_version=$(./bin/next_version.sh)
          echo "version=$next_version" >> $GITHUB_OUTPUT
          echo "Next version: $next_version"

      - name: Insert entry into CHANGELOG.md
        run: |
          # Keep the "# Changelog" header, insert new entry, then append existing entries
          {
            head -2 CHANGELOG.md
            tail -n +3 CHANGES.md
            echo ""
            tail -n +3 CHANGELOG.md
          } > CHANGELOG.tmp
          mv CHANGELOG.tmp CHANGELOG.md

      - name: Format changelog for Slack
        id: slack_format
        if: env.SLACK_BOT_TOKEN != ''
        run: |
          BLOCKS=$(CHANGELOG="$(cat CHANGES.md | head -50)" NEXT_VERSION="${{ steps.version.outputs.version }}" node bin/format-changelog.js)
          echo "blocks=$BLOCKS" >> $GITHUB_OUTPUT

      - name: Remove CHANGES.md
        run: rm -f CHANGES.md

      - name: Post to Slack
        if: env.SLACK_BOT_TOKEN != ''
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ env.SLACK_BOT_TOKEN }}
          payload: |
            channel: "#product_releases"
            blocks: ${{ steps.slack_format.outputs.blocks }}

      - name: Commit changelog and tag
        uses: EndBug/add-and-commit@v9
        with:
          add: 'CHANGELOG.md'
          remove: 'CHANGES.md'
          message: 'chore(release): ${{ steps.version.outputs.version }}'
          tag: '${{ steps.version.outputs.version }}'
          push: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: ${{ steps.read_changes.outputs.changes }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
